name: Spec Validation
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  specsync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: CorvidLabs/spec-sync@v2.4.0
        with:
          strict: 'true'
          require-coverage: '100'
          comment: 'true'
